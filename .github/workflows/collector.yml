name: Polymarket Data Collector

on:
  schedule:
    # Runs at :10, :25, :40, :55 of every hour
    # These are exactly when C2 of a 15-min window closes
    - cron: '* * * * *'
  workflow_dispatch:  # allows manual trigger for testing

permissions:
  contents: write  # needed to commit CSV files back

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        run: python collector.py

      - name: Commit data files
        run: |
          git config user.name  "DataCollector"
          git config user.email "collector@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Add data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
