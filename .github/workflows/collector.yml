name: Polymarket Data Collector

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "DataCollector"
          git config user.email "collector@github.com"

      - name: Run collector
        run: python collector.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
